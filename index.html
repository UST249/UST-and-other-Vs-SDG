<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عاجل | أسعار صرف العملات</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0e14;
            color: #e5e7eb;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        .container { max-width: 800px; width: 100%; }
        
        /* الرأس */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #1f2937;
        }
        .logo { font-size: 28px; font-weight: bold; color: #f97316; }
        .logo span { color: #fff; }
        .time { color: #9ca3af; font-size: 14px; text-align: left; }
        
        /* بطاقة الدولار */
        .main-card {
            background: linear-gradient(145deg, #1a1f2b, #11161f);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #2a3346;
            text-align: center;
        }
        .main-card .currency-name { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
        .main-card .currency-flag { font-size: 40px; }
        .main-card .rate { font-size: 42px; font-weight: 800; color: #fff; margin: 10px 0; }
        .main-card .rate small { font-size: 20px; color: #9ca3af; }
        .status {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 14px;
            background: #1f2937;
            color: #9ca3af;
        }
        .status.up { color: #22c55e; background: #064e3b; }
        .status.down { color: #ef4444; background: #7f1d1d; }
        
        /* شبكة العملات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 25px;
        }
        .currency-card {
            background: #131a24;
            border-radius: 16px;
            padding: 16px 12px;
            border: 1px solid #1f2937;
            transition: 0.2s;
            text-align: center;
        }
        .currency-card:hover { border-color: #f97316; }
        .currency-card .flag { font-size: 26px; display: block; }
        .currency-card .code { font-size: 13px; color: #9ca3af; font-weight: 600; margin: 4px 0; }
        .currency-card .rate-sm { font-size: 20px; font-weight: 700; color: #fff; }
        .currency-card .status-sm { font-size: 12px; display: block; margin-top: 5px; }
        
        /* زر فتح لوحة التحكم */
        .admin-trigger {
            text-align: center;
            margin-top: 30px;
        }
        .admin-trigger button {
            background: transparent;
            border: 1px solid #2a3346;
            color: #6b7280;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        .admin-trigger button:hover {
            border-color: #f97316;
            color: #f97316;
        }

        /* لوحة التحكم (تظهر كطبقة منبثقة) */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .admin-panel.show { display: flex; }
        .admin-box {
            background: #1a1f2b;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #f97316;
            position: relative;
        }
        .admin-box h2 { color: #f97316; margin-bottom: 5px; }
        .admin-box .sub { color: #9ca3af; margin-bottom: 20px; font-size: 14px; }
        .admin-item {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2a3346;
        }
        .admin-item .flag { font-size: 22px; width: 40px; text-align: center; }
        .admin-item .code { width: 70px; font-weight: bold; font-size: 14px; }
        .admin-item input, .admin-item select {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #4b5563;
            background: #0b0e14;
            color: #fff;
            font-size: 14px;
        }
        .admin-item input { width: 110px; }
        .admin-item select { width: 100px; }
        .admin-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .admin-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-save { background: #f97316; color: #000; }
        .btn-save:hover { background: #ea580c; }
        .btn-close { background: #1f2937; color: #fff; }
        .btn-close:hover { background: #374151; }
        .btn-reset { background: #dc2626; color: #fff; }
        .btn-reset:hover { background: #b91c1c; }

        @media (max-width: 600px) {
            .admin-item input { width: 80px; }
            .admin-item select { width: 80px; }
            .admin-item .code { width: 50px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">

    <!-- الرأس -->
    <div class="header">
        <div class="logo">عاجل <span>🕊️</span></div>
        <div class="time" id="currentTime"></div>
    </div>

    <!-- بطاقة الدولار -->
    <div class="main-card" id="mainCard">
        <div class="currency-flag">🇺🇸</div>
        <div class="currency-name">الدولار الأسود</div>
        <div class="rate" id="usdRate">4,600 <small>ج.س</small></div>
        <div class="status" id="usdStatus">ثابت</div>
    </div>

    <!-- شبكة العملات -->
    <h3 style="margin: 20px 0 10px; color: #9ca3af; font-weight: 400;">🇸🇩 باقي العملات</h3>
    <div class="grid" id="currencyGrid"></div>

    <!-- زر فتح لوحة التحكم -->
    <div class="admin-trigger">
        <button onclick="openAdmin()">⚙️ تحديث الأسعار</button>
    </div>
</div>

<!-- ====== لوحة التحكم (الطبقة المنبثقة) ====== -->
<div class="admin-panel" id="adminPanel">
    <div class="admin-box">
        <h2>⚙️ لوحة تحكم "عاجل"</h2>
        <div class="sub">عدل أي سعر أو حالة ثم احفظ التغييرات</div>
        <div id="adminList"></div>
        <div class="admin-actions">
            <button class="btn-save" onclick="saveAdmin()">💾 حفظ التغييرات</button>
            <button class="btn-close" onclick="closeAdmin()">✖ إغلاق</button>
            <button class="btn-reset" onclick="resetData()">↺ إعادة ضبط</button>
        </div>
    </div>
</div>

<script>
    // ------------------- البيانات الافتراضية -------------------
    const defaultData = {
        lastUpdate: 'الخميس، ٢٥ يونيو ٢٠٢٦ - ٠٧:٤١ م',
        currencies: [
            { code: 'USD', name: 'الدولار الأسود', flag: '🇺🇸', rate: '4,600', status: 'ثابت' },
            { code: 'GBP', name: 'جنيه إسترليني', flag: '🇬🇧', rate: '7,368', status: 'صاعد' },
            { code: 'EUR', name: 'يورو', flag: '🇪🇺', rate: '6,388', status: 'صاعد' },
            { code: 'AED', name: 'درهم إماراتي', flag: '🇦🇪', rate: '1,516', status: 'ثابت' },
            { code: 'SAR', name: 'ريال سعودي', flag: '🇸🇦', rate: '1,484', status: 'هابط' },
            { code: 'KWD', name: 'دينار كويتي', flag: '🇰🇼', rate: '18,018', status: 'صاعد' },
            { code: 'QAR', name: 'ريال قطري', flag: '🇶🇦', rate: '1,531', status: 'ثابت' },
            { code: 'TRY', name: 'ليرة تركية', flag: '🇹🇷', rate: '119', status: 'هابط' },
            { code: 'EGP', name: 'جنيه مصري', flag: '🇪🇬', rate: '111', status: 'صاعد' },
            { code: 'OMR', name: 'ريال عماني', flag: '🇴🇲', rate: '14,463', status: 'ثابت' },
            { code: 'BHD', name: 'دينار بحريني', flag: '🇧🇭', rate: '14,766', status: 'ثابت' },
            { code: 'CAD', name: 'دولار كندي', flag: '🇨🇦', rate: '4,066', status: 'صاعد' },
            { code: 'AUD', name: 'دولار أسترالي', flag: '🇦🇺', rate: '3,676', status: 'هابط' },
            { code: 'CHF', name: 'فرنك سويسري', flag: '🇨🇭', rate: '6,238', status: 'ثابت' },
            { code: 'JPY', name: 'ين ياباني', flag: '🇯🇵', rate: '35', status: 'هابط' },
            { code: 'CNY', name: 'يوان صيني', flag: '🇨🇳', rate: '764', status: 'صاعد' },
            { code: 'INR', name: 'روبية هندية', flag: '🇮🇳', rate: '67', status: 'ثابت' },
            { code: 'SEK', name: 'كرونة سويدية', flag: '🇸🇪', rate: '528', status: 'هابط' },
            { code: 'NOK', name: 'كرونة نرويجية', flag: '🇳🇴', rate: '517', status: 'ثابت' },
            { code: 'DKK', name: 'كرونة دنماركية', flag: '🇩🇰', rate: '802', status: 'صاعد' }
        ]
    };

    // تحميل البيانات
    let appData = JSON.parse(localStorage.getItem('ajelCachedData')) || defaultData;

    // ====== عرض الوقت ======
    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateStr = now.toLocaleDateString('ar-SA', options);
        const timeStr = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('currentTime').innerHTML = `${dateStr} - ${timeStr}`;
    }
    updateClock();
    setInterval(updateClock, 60000);

    // ====== عرض الأسعار ======
    function renderRates() {
        const grid = document.getElementById('currencyGrid');
        grid.innerHTML = '';
        const filtered = appData.currencies.filter(c => c.code !== 'USD');
        filtered.forEach(c => {
            const card = document.createElement('div');
            card.className = 'currency-card';
            card.innerHTML = `
                <span class="flag">${c.flag}</span>
                <div class="code">${c.code}</div>
                <div class="rate-sm">${c.rate} <small style="font-size:12px;color:#9ca3af;">ج.س</small></div>
                <span class="status-sm status ${c.status === 'صاعد' ? 'up' : c.status === 'هابط' ? 'down' : ''}">${c.status}</span>
            `;
            grid.appendChild(card);
        });

        const usd = appData.currencies.find(c => c.code === 'USD');
        if (usd) {
            document.getElementById('usdRate').innerHTML = `${usd.rate} <small>ج.س</small>`;
            const statusEl = document.getElementById('usdStatus');
            statusEl.textContent = usd.status;
            statusEl.className = `status ${usd.status === 'صاعد' ? 'up' : usd.status === 'هابط' ? 'down' : ''}`;
        }
        if (appData.lastUpdate) {
            document.querySelector('.time').innerHTML = appData.lastUpdate;
        }
    }

    // ====== فتح لوحة التحكم (طلب كلمة المرور) ======
    window.openAdmin = function() {
        const password = prompt("🔐 أدخل كلمة المرور:");
        if (password === "سايبر ثلاثة وسبعين آه حق أو حش. ألفين وخمسة عادي") {
            document.getElementById('adminPanel').classList.add('show');
            buildAdminList();
        } else if (password !== null) {
            alert("❌ كلمة المرور غير صحيحة!");
        }
    };

    window.closeAdmin = function() {
        document.getElementById('adminPanel').classList.remove('show');
    };

    // ====== بناء جدول التحكم ======
    function buildAdminList() {
        const list = document.getElementById('adminList');
        list.innerHTML = '';
        appData.currencies.forEach((c, index) => {
            const div = document.createElement('div');
            div.className = 'admin-item';
            div.innerHTML = `
                <span class="flag">${c.flag}</span>
                <span class="code">${c.code}</span>
                <input type="text" id="arate_${index}" value="${c.rate}" placeholder="السعر">
                <select id="astatus_${index}">
                    <option value="ثابت" ${c.status === 'ثابت' ? 'selected' : ''}>ثابت</option>
                    <option value="صاعد" ${c.status === 'صاعد' ? 'selected' : ''}>صاعد</option>
                    <option value="هابط" ${c.status === 'هابط' ? 'selected' : ''}>هابط</option>
                </select>
            `;
            list.appendChild(div);
        });
    }

    // ====== حفظ التغييرات ======
    window.saveAdmin = function() {
        const newCurrencies = appData.currencies.map((c, index) => {
            const rateInput = document.getElementById(`arate_${index}`);
            const statusSelect = document.getElementById(`astatus_${index}`);
            return {
                ...c,
                rate: rateInput ? rateInput.value.trim() || c.rate : c.rate,
                status: statusSelect ? statusSelect.value : c.status
            };
        });

        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateStr = now.toLocaleDateString('ar-SA', options);
        const timeStr = now.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });

        appData.currencies = newCurrencies;
        appData.lastUpdate = `${dateStr} - ${timeStr}`;
        localStorage.setItem('ajelCachedData', JSON.stringify(appData));

        renderRates();
        closeAdmin();
        alert('✅ تم حفظ الأسعار الجديدة بنجاح!');
    };

    // ====== إعادة الضبط ======
    window.resetData = function() {
        if (confirm('⚠️ هل أنت متأكد؟ ستعود الأسعار إلى القيم الافتراضية.')) {
            localStorage.removeItem('ajelCachedData');
            appData = JSON.parse(JSON.stringify(defaultData));
            renderRates();
            closeAdmin();
            alert('تمت إعادة الضبط إلى الأسعار الافتراضية.');
        }
    };

    // العرض الأولي
    renderRates();

    // تحديث دوري
    setInterval(() => {
        const fresh = JSON.parse(localStorage.getItem('ajelCachedData'));
        if (fresh) {
            appData = fresh;
            renderRates();
        }
    }, 30000);
</script>
</body>
</html>
